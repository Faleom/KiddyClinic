<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiddyClinic Admin Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg dashboard-navbar border-bottom">
        <div class="container-fluid px-3 px-md-4">
            <span class="navbar-brand mb-0 h1 fw-semibold">KiddyClinic Admin Dashboard</span>
            <div class="d-flex align-items-center gap-2 gap-md-3 ms-auto">
                <a href="patients.html" class="btn btn-outline-primary btn-sm">Patients</a>
                <span id="userEmail" class="small text-muted d-none d-sm-inline">Loading user...</span>
                <button id="refreshBtn" type="button" class="btn btn-outline-success btn-sm">Refresh</button>
                <button id="logoutBtn" type="button" class="btn btn-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-3 px-md-4 py-4">
        <section class="card shadow-sm border-0">
            <div class="card-body">
                <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3 mb-3">
                    <div>
                        <h2 class="h5 mb-1">Form Submissions</h2>
                        <p class="text-muted mb-0">Manage submissions grouped by form type.</p>
                    </div>
                    <span id="recordCount" class="badge text-bg-light">0 records</span>
                </div>

                <div id="alertBox" class="alert d-none" role="alert"></div>

                <div id="loadingState" class="state-box text-center py-5">
                    <div class="spinner-border text-success" role="status" aria-hidden="true"></div>
                    <p class="mt-3 mb-0 text-muted">Loading dashboard data...</p>
                </div>

                <div id="emptyState" class="state-box text-center py-5 d-none">
                    <h3 class="h6 mb-2">No submissions found</h3>
                    <p class="text-muted mb-0">New form data will appear here once submitted.</p>
                </div>

                <div id="contentArea" class="d-none">
                    <ul id="tabList" class="nav nav-pills flex-nowrap flex-md-wrap overflow-auto pb-2" role="tablist" aria-label="Form type tabs"></ul>

                    <div class="table-responsive mt-3">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Form Type</th>
                                    <th scope="col">Submitted Date</th>
                                    <th scope="col">Patient Biodata</th>
                                    <th scope="col">Form Data</th>
                                    <th scope="col" class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="dashboard.js" defer></script>
</body>
</html>
