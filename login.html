<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">

    <title>KiddyClinic - Masuk</title> 
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap');
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins" , sans-serif;
        }
        body{
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #00834c;
            padding: 0px;
        }
        .container{
            position: relative;
            max-width: 850px;
            width: 100%;
            background: #fff;
            padding: 40px 30px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            perspective: 2700px;
        }
        .container .cover{
            position: absolute;
            top: 0;
            left: 50%;
            height: 100%;
            width: 50%;
            z-index: 98;
            transition: all 1s ease;
            transform-origin: left;
            transform-style: preserve-3d;
        }
        .container .cover::before{
            content: '';
            position: absolute;
            height: 100%;
            width: 100%;
            background: #00834c;
            opacity: 0.5;
            z-index: 100;
        }
        .container .cover::after{
            content: '';
            position: absolute;
            height: 100%;
            width: 100%;
            background: #00834c;
            opacity: 0.5;
            z-index: 100;
            transform: rotateY(180deg);
        }
        .container #flip:checked ~ .cover{
            transform: rotateY(-180deg);
        }
        .container .cover img{
            position: absolute;
            height: 100%;
            width: 100%;
            object-fit: cover;
            z-index: 12;
            backface-visibility: hidden;
        }
        .container .cover .back .backImg{
            transform: rotateY(180deg);
            transform: rotateY(180deg);
        }
        .container .cover .text{
            position: absolute;
            z-index: 111;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .cover .text .text-1,
        .cover .text .text-2{
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            text-align: center;
            backface-visibility: hidden;
        }
        .cover .back .text .text-1,
        .cover .back .text .text-2{
            transform: rotateY(180deg);
        }
        .cover .text .text-2{
            font-size: 15px;
            font-weight: 500;
        }
        .container .forms{
            height: 100%;
            width: 100%;
            background: #fff;
        }
        .container .form-content{
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .form-content .login-form,
        .form-content .signup-form{
            width: calc(100% / 2 - 25px);
        }
        .forms .form-content .title{
            position: relative;
            font-size: 24px;
            font-weight: 500;
            color: #333;
        }
        .forms .form-content .title:before{
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            height: 3px;
            width: 25px;
            background: #00834c;
        }
        .forms .signup-form  .title:before{
            width: 20px;
        }
        .forms .form-content .input-boxes{
            margin-top: 30px;
        }
        .forms .form-content .input-box{
            display: flex;
            align-items: center;
            height: 50px;
            width: 100%;
            margin: 10px 0;
            position: relative;
        }
        .form-content .input-box input,
        .form-content .input-box select{
            height: 100%;
            width: 100%;
            outline: none;
            border: none;
            padding: 0 30px;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 2px solid rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .form-content .input-box input:focus,
        .form-content .input-box input:valid,
        .form-content .input-box select:focus,
        .form-content .input-box select:valid{
            border-color: #00834c;
        }
        .form-content .input-box i{
            position: absolute;
            color: #00834c;
            font-size: 17px;
        }
        .forms .form-content .text{
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }
        .forms .form-content .text a{
            text-decoration: none;
        }
        .forms .form-content .text a:hover{
            text-decoration: underline;
        }
        .forms .form-content .button{
            color: #fff;
            margin-top: 40px;
        }
        .forms .form-content .button input,
        .forms .form-content .button select{
            color: #fff;
            background: #00834c;
            border-radius: 6px;
            padding: 0;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .forms .form-content .button input:hover,
        .forms .form-content .button select:hover{
            background: #13b98f;
        }
        .forms .form-content label{
            color: #00834c;
            cursor: pointer;
        }
        .forms .form-content label:hover{
            text-decoration: underline;
        }
        .forms .form-content .login-text,
        .forms .form-content .sign-up-text{
            text-align: center;
            margin-top: 25px;
        }
        .container #flip{
            display: none;
        }        
        @media (max-width: 730px) {
            .container .cover{
                display: none;
            }
            .form-content .login-form,
            .form-content .signup-form{
                width: 100%;
            }
            .form-content .signup-form{
                display: none;
            }
            .container #flip:checked ~ .forms .signup-form{
                display: block;
            }
            .container #flip:checked ~ .forms .login-form{
                display: none;
            }
        }
    </style>   
</head>
<body>
    <div class="container">
        <input type="checkbox" id="flip">
        <div class="cover">
            <div class="front">
                <img src="https://miro.medium.com/max/15904/1*9L6543aM8rKDKrd0vi0n4g.jpeg" alt="">
                <div class="text">
                    <span class="text-1">Every new friend is a <br> new adventure</span>
                    <span class="text-2">Let's get connected</span>
                </div>
            </div>            
        </div>
        <div class="forms">
            <div class="form-content">
                <div class="login-form">
                    <div class="title">Masuk</div>
                    <form action="/api/login" method="post">
                        <div class="input-boxes">
                        <div class="input-box">
                            <i class="fas fa-envelope"></i>
                            <input type="email" name="email" placeholder="Email" required>
                        </div>
                        <div class="input-box">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="password" placeholder="Password" required>
                        </div>
                        <div class="text"><a href="#">Lupa Sandi?</a></div>
                        <div class="button input-box">
                            <input type="submit" value="Masuk">
                        </div>
                        <div class="text sign-up-text">Belum punya akun? <label for="flip">Daftar sekarang!</label></div>
                        </div>
                    </form>
                </div>
                <div class="signup-form">
                    <div class="title">Daftar</div>
                    <form action="/api/signup" method="post">
                        <div class="input-boxes">
                            <div class="input-box">
                                <i class="fas fa-user"></i>
                                <input type="text" name="name" placeholder="Nama Lengkap Anak" required>
                            </div>
                            <div class="input-box">
                                <i class="fas fa-user"></i>
                                <input type="text" placeholder="Nama Lengkap Orang Tua" required>
                            </div>
                            <div class="input-box">
                                <i class="fas fa-envelope"></i>
                                <input type="email" name="email" placeholder="Email" required>
                            </div>
                            <div class="input-box">
                                <i class="fas fa-phone"></i>
                                <input type="text" placeholder="Nomor Telepon" required>
                            </div>
                            <div class="input-box">
                                <i class="fas fa-calendar-alt"></i>
                                <input type="text" placeholder="Tanggal Lahir" onfocus="(this.type='date')" onblur="if(this.value==''){this.type='text'}" required>
                            </div>
                            <div class="input-box">
                                <i class="fas fa-male"></i>
                                <i class="fas fa-female pl-1"></i>                                
                                <select class="form-control" id="exampleFormControlSelect1" required>
                                    <option value="" disabled selected hidden class="text-muted">Jenis Kelamin</option>
                                    <option>Laki-Laki</option>
                                    <option>Perempuan</option> 
                                </select>          
                            </div>
                            <div class="input-box">
                                <i class="fas fa-lock"></i>
                                <input type="password" name="password" placeholder="Password" required>
                            </div>
                            <div class="input-box">
                                <i class="fas fa-user-lock"></i>
                                <input type="password" placeholder="Ulangi Password" required>
                            </div>
                            <div class="button input-box">
                                <input type="submit" value="Daftar">
                            </div>
                            <div class="text sign-up-text">Sudah punya akun? <label for="flip">Masuk sekarang!</label></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>    
    <script src="auth.js" defer></script>
</body>
</html>
